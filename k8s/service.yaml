---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: ivy-ai-api
  namespace: ivy-ai
  labels:
    app: ivy-ai
    component: api
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: http
    protocol: TCP
    name: http
  - port: 8001
    targetPort: metrics
    protocol: TCP
    name: metrics

  selector:
    app: ivy-ai
    component: api

  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ivy-ai
  labels:
    app: postgres
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP

  selector:
    app: postgres

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ivy-ai
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
    name: redis

  selector:
    app: redis

---
# External API Service (LoadBalancer for cloud)
apiVersion: v1
kind: Service
metadata:
  name: ivy-ai-lb
  namespace: ivy-ai
  labels:
    app: ivy-ai
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  - port: 443
    targetPort: 443
    protocol: TCP
    name: https

  selector:
    app: ivy-ai-ingress

---
# Ingress Controller Service (for internal routing)
apiVersion: v1
kind: Service
metadata:
  name: ivy-ai-ingress
  namespace: ivy-ai
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  - port: 443
    targetPort: 443
    protocol: TCP
    name: https

  selector:
    app: ivy-ai-ingress
