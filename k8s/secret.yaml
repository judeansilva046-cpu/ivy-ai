---
# Kubernetes Secret for Sensitive Data
# NOTE: Use external secret management in production (Vault, AWS Secrets Manager, etc)
apiVersion: v1
kind: Secret
metadata:
  name: ivy-ai-secrets
  namespace: ivy-ai
type: Opaque
stringData:
  # Database
  DATABASE_URL: "postgresql://user:password@postgres:5432/ivy_ai"
  DB_USER: "ivy_ai_user"
  DB_PASSWORD: "secure_password_change_in_production"

  # Redis
  REDIS_URL: "redis://:password@redis:6379/0"
  REDIS_PASSWORD: "secure_password_change_in_production"

  # JWT
  JWT_SECRET_KEY: "your-secret-key-change-in-production"
  JWT_ALGORITHM: "HS256"

  # API Keys
  OPENAI_API_KEY: "sk-..."
  GOOGLE_API_KEY: "..."

  # Email
  SMTP_USER: "noreply@ivyai.dev"
  SMTP_PASSWORD: "secure_password"
  SMTP_HOST: "smtp.sendgrid.net"
  SMTP_PORT: "587"

  # Encryption
  ENCRYPTION_KEY: "your-encryption-key-change-in-production"

  # AWS (if using AWS)
  AWS_ACCESS_KEY_ID: "..."
  AWS_SECRET_ACCESS_KEY: "..."
  AWS_REGION: "us-east-1"

  # Monitoring
  SENTRY_DSN: "https://...@sentry.io/..."
  DATADOG_API_KEY: "..."

---
# TLS Certificate Secret (self-signed for demo)
# In production, use cert-manager and Let's Encrypt
apiVersion: v1
kind: Secret
metadata:
  name: ivy-ai-tls
  namespace: ivy-ai
type: kubernetes.io/tls
data:
  # Generated with: openssl req -x509 -newkey rsa:4096 -keyout key.pem -out cert.pem -days 365 -nodes
  tls.crt: "LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCk1JSURazCNCZ0lCR..."
  tls.key: "LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0tCk1JSUEvZ0lCQURB..."

---
# Docker Registry Secret (if using private registry)
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry
  namespace: ivy-ai
type: kubernetes.io/dockercfg
stringData:
  .dockercfg: |
    {
      "docker.io": {
        "username": "username",
        "password": "password",
        "email": "email@example.com",
        "auth": "dXNlcm5hbWU6cGFzc3dvcmQ="
      }
    }
