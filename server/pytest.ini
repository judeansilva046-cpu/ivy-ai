[pytest]
# Pytest configuration for Ivy AI

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow tests
    asyncio: Async tests

# Coverage
addopts =
    --verbose
    --strict-markers
    --tb=short
    --disable-warnings

asyncio_mode = auto
